<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FerreStock — Usuarios</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">FerreStock</div>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/categorias">Categorías</a>
      <a href="/usuarios" class="active">Usuarios</a>
      <a href="/productos">Productos</a>
      <a href="/ventas">Ventas</a>
      <a href="/reportes">Reportes</a>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container">
    <h2 class="page-title">Gestión de Usuarios</h2>

    <div class="section">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="buscador" placeholder="Buscar usuario..."
                 style="padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;width:220px"/>
          <select id="filtroRol" style="padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;">
            <option value="">Todos los roles</option>
            <option value="admin">Admin</option>
            <option value="vendedor">Vendedor</option>
          </select>
        </div>
        <button class="btn-secondary" onclick="abrirModal()">Nuevo Usuario</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyUsuarios">
            <tr><td colspan="7" class="empty-msg">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modalUsuario">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <h3 id="modalTitulo">Nuevo Usuario</h3>
      <form id="formUsuario">
        <input type="hidden" id="usuarioId"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="uNombre" required placeholder="Ricardo"/>
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" id="uApellido" required placeholder="Guevara"/>
          </div>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="uEmail" required placeholder="correo@ejemplo.com"/>
        </div>
        <div class="form-group" id="passwordGroup">
          <label>Contraseña</label>
          <input type="password" id="uPassword" placeholder="Mínimo 6 caracteres"/>
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select id="uRol">
            <option value="vendedor">Vendedor</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div id="modalError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/usuarios.js"></script>
</body>
</html>
