<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FerreStock — Productos</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🔧 FerreStock</div>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/productos" class="active">Productos</a>
      <a href="/ventas">Ventas</a>
      <a href="/reportes">Reportes</a>
      <a href="/usuarios">Usuarios</a>
      <a href="/categorias">Categorias</a>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container">
    <h2 class="page-title">Gestión de Productos</h2>

    <div class="section">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="buscador" placeholder="Buscar producto..." style="padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;width:220px"/>
          <select id="filtroStock" style="padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;">
            <option value="">Todos</option>
            <option value="critico">Solo stock crítico</option>
          </select>
        </div>
        <div id="adminActions" class="hidden">
          <button class="btn-secondary" onclick="abrirModalProducto()">Nuevo Producto</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="tablaProductos">
          <thead>
            <tr>
              <th>ID</th><th>Nombre</th><th>Categoría</th>
              <th>P. Compra</th><th>P. Venta</th><th>Stock</th>
              <th>Mínimo</th><th>Estado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyProductos">
            <tr><td colspan="9" class="empty-msg">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modalProducto">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <h3 id="modalTitulo">Nuevo Producto</h3>
      <form id="formProducto">
        <input type="hidden" id="productoId"/>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="pNombre" required/>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <input type="text" id="pDescripcion"/>
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select id="pCategoria" required></select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
          <div class="form-group">
            <label>Precio Compra ($)</label>
            <input type="number" id="pCompra" step="0.01" min="0" required/>
          </div>
          <div class="form-group">
            <label>Precio Venta ($)</label>
            <input type="number" id="pVenta" step="0.01" min="0" required/>
          </div>
          <div class="form-group">
            <label>Stock Inicial</label>
            <input type="number" id="pStock" min="0" required/>
          </div>
          <div class="form-group">
            <label>Stock Mínimo</label>
            <input type="number" id="pMinimo" min="0" value="5" required/>
          </div>
        </div>
        <div id="modalError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Guardar Producto</button>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/productos.js"></script>
</body>
</html>
