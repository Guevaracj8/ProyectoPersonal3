<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FerreStock — Categorías</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">FerreStock</div>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/productos">Productos</a>
      <a href="/ventas">Ventas</a>
      <a href="/reportes">Reportes</a>
      <a href="/usuarios">Usuarios</a>
      <a href="/categorias" class="active">Categorias</a>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container">
    <h2 class="page-title">Gestión de Categorías</h2>

    <div class="section">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="buscador" placeholder="Buscar categoría..."
                 style="padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;width:220px"/>
        </div>
        <button class="btn-secondary" onclick="abrirModal()">Nueva Categoría</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyCategorias">
            <tr><td colspan="4" class="empty-msg">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modalCategoria">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <h3 id="modalTitulo">Nueva Categoría</h3>
      <form id="formCategoria">
        <input type="hidden" id="categoriaId"/>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="cNombre" required placeholder="Ej: Herramientas eléctricas"/>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <input type="text" id="cDescripcion" placeholder="Ej: Taladros, sierras, etc."/>
        </div>
        <div id="modalError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/categorias.js"></script>
</body>
</html>
